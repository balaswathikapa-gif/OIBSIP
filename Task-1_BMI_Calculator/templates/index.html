<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<style>

body{
font-family: Arial;
background:#e6f2ff;
}

.container{
width:400px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:15px;
font-size:18px;
color:green;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>BMI Calculator</h2>

<form method="POST">

<input type="number" step="0.1" name="weight" placeholder="Enter weight (kg)" required>

<input type="number" step="0.01" name="height" placeholder="Enter height (m)" required>

<br>

<button type="submit">Calculate BMI</button>

</form>

{% if bmi %}
<div class="result">
<p>Your BMI: <b>{{ bmi }}</b></p>
<p>Category: <b>{{ category }}</b></p>
</div>
{% endif %}

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

</div>

</body>
</html>
